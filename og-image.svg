<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f0e17"/>
      <stop offset="100%" stop-color="#1a1a2e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#7209b7"/>
      <stop offset="100%" stop-color="#f72585"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect x="0" y="610" width="1200" height="20" fill="url(#accent)"/>
  <text x="600" y="240" font-size="120" font-family="system-ui,-apple-system,sans-serif" font-weight="800" fill="white" text-anchor="middle" dominant-baseline="central">Link<tspan fill="#7209b7">Words</tspan></text>
  <text x="600" y="340" font-size="36" font-family="system-ui,-apple-system,sans-serif" font-weight="400" fill="rgba(255,255,255,0.7)" text-anchor="middle" dominant-baseline="central">Daily Word Association Puzzle</text>
  <g transform="translate(300, 430)">
    <rect x="0" y="0" width="100" height="44" rx="8" fill="rgba(114,9,183,0.3)" stroke="#7209b7" stroke-width="2"/>
    <text x="50" y="26" font-size="18" font-family="system-ui,sans-serif" font-weight="700" fill="white" text-anchor="middle">FIRE</text>
    <text x="120" y="26" font-size="24" fill="rgba(255,255,255,0.5)" text-anchor="middle">→</text>
    <rect x="140" y="0" width="120" height="44" rx="8" fill="rgba(114,9,183,0.3)" stroke="#7209b7" stroke-width="2"/>
    <text x="200" y="26" font-size="18" font-family="system-ui,sans-serif" font-weight="700" fill="white" text-anchor="middle">DRAGON</text>
    <text x="280" y="26" font-size="24" fill="rgba(255,255,255,0.5)" text-anchor="middle">→</text>
    <rect x="300" y="0" width="100" height="44" rx="8" fill="rgba(114,9,183,0.3)" stroke="#7209b7" stroke-width="2"/>
    <text x="350" y="26" font-size="18" font-family="system-ui,sans-serif" font-weight="700" fill="white" text-anchor="middle">GOLD</text>
    <text x="420" y="26" font-size="24" fill="rgba(255,255,255,0.5)" text-anchor="middle">→</text>
    <rect x="440" y="0" width="120" height="44" rx="8" fill="rgba(76,201,240,0.2)" stroke="#4cc9f0" stroke-width="2"/>
    <text x="500" y="26" font-size="18" font-family="system-ui,sans-serif" font-weight="700" fill="#4cc9f0" text-anchor="middle">OCEAN</text>
